<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker</title>
    <link rel="stylesheet" href="/mainpagev1.css">
</head>
<body>
<div class="container">
    <!-- Auth Section -->
    <div id="authSection" class="auth-section">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-form active">
            <h2>Login</h2>
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button id="loginBtn">Login</button>
            <div class="error-message" id="loginError"></div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form">
            <h2>Register</h2>
            <input type="text" id="regUsername" placeholder="Username" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <select id="regRole">
                <option value="USER">User</option>
                <option value="MANAGER">Manager</option>
                <option value="ADMIN">Admin</option>
            </select>
            <button id="registerBtn">Register</button>
            <div class="error-message" id="registerError"></div>
        </div>
    </div>

    <!-- Main App Section (visible after login) -->
    <div id="appSection" style="display: none;">
        <div class="header">
            <h1>Activity Tracker</h1>
            <div class="user-info">
                <span id="currentUser"></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>

        <!-- User Selection for Viewing Actions -->
        <div class="user-selector">
            <h3>View Actions</h3>
            <div class="selector-controls">
                <select id="viewUserSelect">
                    <option value="">Select User</option>
                </select>
                <button id="loadActionsBtn">Load Actions</button>
            </div>
        </div>

        <!-- Add Action Section -->
        <div class="add-action-section">
            <h3>Add New Action</h3>
            <div class="action-type-selector">
                <button class="action-type-btn active" data-type="mouse">Mouse Action</button>
                <button class="action-type-btn" data-type="keyboard">Keyboard Action</button>
                <button class="action-type-btn" data-type="app">App Action</button>
            </div>

            <!-- Mouse Action Form -->
            <div id="mouseForm" class="action-form active">
                <h4>Mouse Movement</h4>
                <div class="form-group">
                    <label>Delta X:</label>
                    <input type="number" id="mouseDeltaX" placeholder="Pixels moved X">
                </div>
                <div class="form-group">
                    <label>Delta Y:</label>
                    <input type="number" id="mouseDeltaY" placeholder="Pixels moved Y">
                </div>
                <div class="real-time-controls">
                    <h4>Real-time Mouse Tracking</h4>
                    <button id="startMouseTracking" class="tracking-btn">Start Tracking</button>
                    <button id="stopMouseTracking" class="tracking-btn" disabled>Stop Tracking</button>
                    <div id="mouseCoordinates" class="coordinates">X: 0, Y: 0</div>
                </div>
            </div>

            <!-- Keyboard Action Form -->
            <div id="keyboardForm" class="action-form">
                <h4>Keyboard Input</h4>
                <div class="form-group">
                    <label>Key Code:</label>
                    <input type="number" id="keyCode" placeholder="Enter key code">
                </div>
                <div class="real-time-controls">
                    <h4>Real-time Keyboard Tracking</h4>
                    <button id="startKeyboardTracking" class="tracking-btn">Start Tracking</button>
                    <button id="stopKeyboardTracking" class="tracking-btn" disabled>Stop Tracking</button>
                    <div id="lastKeyPressed" class="coordinates">Last key: None</div>
                </div>
            </div>

            <!-- App Action Form -->
            <div id="appForm" class="action-form">
                <h4>Application Usage</h4>
                <div class="form-group">
                    <label>App Name:</label>
                    <input type="text" id="appName" placeholder="Application name">
                </div>
            </div>

            <button id="submitActionBtn" class="submit-btn">Add Action</button>
            <div class="action-message" id="actionMessage"></div>
        </div>

        <!-- Actions List Section -->
        <div class="actions-list-section">
            <h3>Actions</h3>
            <div class="actions-filter">
                <label>Filter by type:</label>
                <select id="filterType">
                    <option value="all">All</option>
                    <option value="mouse">Mouse Actions</option>
                    <option value="keyboard">Keyboard Actions</option>
                    <option value="app">App Actions</option>
                </select>
            </div>
            <div id="actionsList" class="actions-list">
                <p>Select a user and click "Load Actions"</p>
            </div>
        </div>
    </div>
</div>

<script src="/mainpagev1.js"></script>
</body>
</html>
